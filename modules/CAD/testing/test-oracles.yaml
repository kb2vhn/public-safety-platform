  status: PROPOSED
  implementation_status: NOT_IMPLEMENTED
  operation_id: CAD-OP-DEGRADED-ACTION-RECONCILE
  expected_outcomes:
  - COMMITTED
  - REJECTED_AUTHORIZATION
  - REJECTED_CONFLICT
  - REJECTED_STATE
  - EXPIRED
  - QUARANTINED
  - RECONCILED
