  - REJECTED_AUTHORIZATION
  - REJECTED_VALIDATION
  - REJECTED_CONFLICT
  - REJECTED_STATE
  - EXPIRED
  - QUARANTINED
  before_state:
  - unit.current_assignment
  - unit.current_status
  - incident.current
  - incident.timeline
  - outbox.pending
  - delivery.current
  expected_changes: []
  expected_unchanged:
  - unit.current_assignment
  - unit.current_status
  - incident.current
  - incident.timeline
  - outbox.pending
  - delivery.current
  expected_absent:
  - assignment.committed
  - outbox.created
  - delivery.created
  - cross_context.effect
  - foundation.authority_manufactured
  permitted_evidence:
  - security.authorization_denial
  - security.validation_rejection
  - telemetry.operation_result
  - quarantine.record_when_required
  comparison:
    method: canonical_state_digest
    digest: sha256
  applicable_tiers:
  - 2
  - 3
  - 4
  - 5
  - 6
  - 7
  - 8
  reviewer: UNASSIGNED
  provisional_invariant_statements:
  - one_authoritative_assignment_when_single_assignment_required
  - no_local_or_external_state_creates_authority
