schema_version: '1.0'
registry_id: CAD-REG-TEST-ORACLES
module: CAD
owner: Iron Signal Systems
status: DESIGN_ONLY
authority: modules/CAD/docs/architecture/cad-test-oracle-and-side-effect-verification-model.md
outcome_classes:
- COMMITTED
- REJECTED_POLICY
- REJECTED_AUTHENTICATION
- REJECTED_AUTHORIZATION
- REJECTED_VALIDATION
- REJECTED_CONFLICT
- REJECTED_STATE
- QUEUED_NONAUTHORITATIVE
- PENDING_AUTHORITATIVE_VALIDATION
- RETRYABLE_SERIALIZATION
- RETRYABLE_DEADLOCK
- RETRYABLE_TIMEOUT
- CANCELLED
- CONNECTION_LOST_UNCERTAIN
- FAILED_TECHNICAL
- EXPIRED
- QUARANTINED
- RECONCILED
- UNKNOWN
entries:
- id: CAD-ORACLE-UNIT-ASSIGN-COMMIT
  title: Authorized unit assignment commits exactly once
  status: PROPOSED
  implementation_status: NOT_IMPLEMENTED
  operation_id: CAD-OP-UNIT-ASSIGN
  expected_outcomes:
  - COMMITTED
  before_state:
  - unit.current_assignment
  - unit.current_status
  - incident.current
  - incident.timeline
  - outbox.pending
  expected_changes:
  - unit.current_assignment
  - incident.timeline
  expected_unchanged:
  - unrelated_unit.current_assignment
  - unrelated_incident.current
  expected_absent:
  - duplicate_assignment.committed
  - cross_context.effect
  permitted_evidence:
  - audit.operation_commit
  - telemetry.operation_result
  comparison:
    method: canonical_state_digest
    digest: sha256
  applicable_tiers:
  - 2
  - 3
  - 4
  - 5
  - 6
  - 7
  - 8
  reviewer: UNASSIGNED
  provisional_invariant_statements:
  - one_authoritative_assignment_when_single_assignment_required
  - timeline_matches_current_projection
- id: CAD-ORACLE-UNIT-ASSIGN-REJECT
