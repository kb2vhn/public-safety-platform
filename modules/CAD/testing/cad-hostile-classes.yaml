  minimum_credit_class: PRIMARY
  high_impact: true
- id: CAD-HC-WRONG-SCOPE-OR-TARGET
  title: Wrong organization, agency, scope, purpose, operation, target, incident, unit, alert, or resource
  status: PROPOSED
  minimum_credit_class: PRIMARY
  high_impact: true
- id: CAD-HC-MISSING-FORGED-CONTRADICTORY-CONTEXT
  title: Missing, forged, duplicated, contradictory, or malformed identity and authorization context
  status: PROPOSED
  minimum_credit_class: PRIMARY
  high_impact: true
- id: CAD-HC-STALE-AUTHORIZATION
  title: Stale approval, authorization, lease, policy, session, or authority context
  status: PROPOSED
  minimum_credit_class: PRIMARY
  high_impact: true
- id: CAD-HC-STALE-OPERATIONAL-STATE
  title: Stale incident, unit, location, recommendation, assignment, alert, timer, or version state
  status: PROPOSED
  minimum_credit_class: PRIMARY
  high_impact: true
