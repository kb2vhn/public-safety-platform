  status: PROPOSED
  minimum_credit_class: PRIMARY
  high_impact: true
- id: CAD-HC-UNAUTHORIZED-FUNCTION-EXECUTION
  title: Unauthorized controlled-function execution
  status: PROPOSED
  minimum_credit_class: PRIMARY
  high_impact: true
- id: CAD-HC-SEARCH-PATH-OR-OBJECT-SUBSTITUTION
  title: Search-path manipulation or cross-schema object substitution
  status: PROPOSED
  minimum_credit_class: PRIMARY
  high_impact: true
- id: CAD-HC-CONCURRENT-REORDERING
  title: Concurrent, reordered, or winner-selection manipulation
  status: PROPOSED
  minimum_credit_class: PRIMARY
  high_impact: true
